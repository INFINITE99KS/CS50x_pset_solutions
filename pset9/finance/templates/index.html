{% extends 'layout.html' %}

{% block title %}
    Portfolio
{% endblock %}

{% block main %}

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Shares</th>
                <th>Price</th>
                <th>Transacted</th>
            </tr>
        </thead>
        <tbody>
            {% for share in shares %}
                <tr>
                    <td>{{share.symbol}}</th>
                    <td>{{share.shares}}</th>
                    <td>{{share.price|usd}}</th>
                    <td>{{share.total|usd}}</th>
                </tr>
            {% endfor %}
            <tfoot>
                <tr>
                    <th></th>
                    <th></th>
                    <th>Cash</th>
                    <th>{{userCash|usd}}</th>
                </tr>
                <tr>
                    <th></th>
                    <th></th>
                    <th>Total</th>
                    <th>{{totalCash|usd}}</th>
                </tr>
            </tfoot>
        </tbody>
    </table>

{% endblock %}
