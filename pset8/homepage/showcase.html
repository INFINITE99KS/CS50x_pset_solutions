        <script>
           function validateQ1(event)
            {
                let trigger = event.srcElement;
                let containedData= trigger.innerHTML;
                if(containedData === "Khufu")
               {
                 trigger.style.backgroundColor = "Green";
                 document.getElementById("correctanswer").innerHTML = "Correct! Great";
               }
               else
               {
                trigger.style.backgroundColor = "Red";
                document.getElementById("correctanswer").innerHTML = "Incorrrect!";
               }
            }

            function validate2(event)
            {
                let trigger = event.srcElement;
                let input = document.querySelector('#answersecq');
                if(input.value.toLowerCase() === `sudan`)
                {
                 document.querySelector('#secondParagraph').innerHTML = `Correct!`;
                 trigger.style.backgroundColor = 'Green';
                }
                else
                {
                    document.querySelector('#secondParagraph').innerHTML = `Incorrect, try again!`;
                    trigger.style.backgroundColor = 'Red';
                }
            }
        </script>
